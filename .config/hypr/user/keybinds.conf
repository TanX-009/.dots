bind = SUPER SHIFT, X, exec, hyprpicker -a -n
bind = CTRL ALT, L, exec, hyprlock

# Frontend: Workspace 1, runs 'prd', then toggles (hides) terminal
bind = SUPER, I, exec, [workspace 1] kitty sh -c "cd ~/C/pedif-frontend && nvim -c 'lua require(\"nvchad.term\").runner({ pos = \"sp\", cmd = \"prd\", id = \"htoggleTerm\", clear_cmd = false }); require(\"nvchad.term\").toggle({ pos = \"sp\", id = \"htoggleTerm\" })'"

# Backend: Workspace 2 (silent), sources venv, runs 'python main.py', then toggles (hides) terminal
bind = SUPER, I, exec, [workspace 2 silent] kitty fish -c "cd ~/C/pedif-backend; source .venv/bin/activate.fish; poc up -d; nvim -c 'lua require(\"nvchad.term\").runner({ pos = \"sp\", cmd = \"python main.py\", id = \"htoggleTerm\", clear_cmd = false }); require(\"nvchad.term\").toggle({ pos = \"sp\", id = \"htoggleTerm\" })'"

# Keystone: Workspace 3 (silent), runs command and kitty exits automatically
bind = SUPER, I, exec, [workspace 3 silent] kitty fish -c "cd ~/C/supedio-keystone; poc up -d"

bind = SUPER, Return, exec, kitty
bind = SUPER, X, exec, foot
bind = SUPER, E, exec, kitty --title=ranger ranger
bind = SUPER SHIFT, E, exec, nautilus
bind = SUPER, M, exec, g4music

