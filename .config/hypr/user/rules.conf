}

windowrule {
  name = windowrule-11
  float = on
  match:title = ^(File Operation Progress)$
}

windowrule {
  name = windowrule-12
  float = on
  match:title = branchdialog
}


windowrule {
  name = windowrule-13
  float = on
  match:title = viewnior
}

windowrule {
  name = windowrule-14
  float = on
  match:title = wihotspot-gui
}

windowrule {
  name = windowrule-15
  float = on
  match:title = pavucontrol
}

windowrule {
  name = windowrule-16
  float = on
  match:title = ^(com.saivert.pwvucontrol)$
}

windowrule {
  name = windowrule-17
  float = on
  match:title = blueberry.py
}


windowrule {
  name = windowrule-18
  idle_inhibit = focus
  match:title = mpv
}

windowrule {
  name = windowrule-19
  idle_inhibit = focus
  match:title = vlc
}

windowrule {
  name = windowrule-20
  idle_inhibit = fullscreen
  match:class = ^(Brave-browser)$
}


windowrule {
  name = windowrule-21
  float = on
  match:class = ^(pwvucontrol)$
}

windowrule {
  name = windowrule-22
  float = on
  match:class = ^(com.saivert.pwvucontrol)$
}

windowrule {
  name = windowrule-23
  float = on
  match:class = ^(org.kde.polkit-kde-authentication-agent-1)$
}


windowrule {
  name = windowrule-24
  float = on
  size = 1000 800
  move = (460) (140)
  match:title = ^(Blender Preferences)$
}


windowrule {
  name = windowrule-25
  float = on
  match:title = ^(Media viewer)$
}

windowrule {
  name = windowrule-26
  float = on
  match:title = ^(Picture-in-Picture)$
}


windowrule {
  name = windowrule-27
  float = on
  size = 800 600
  move = (75) ((monitor_h*0.44))
  match:title = ^(Volume Control)$
}


