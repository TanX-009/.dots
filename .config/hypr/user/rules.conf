windowrule {
  name = windowrule-1
  float = on
  match:class = file_progress
}

windowrule {
  name = windowrule-2
  float = on
  match:class = confirm
}

windowrule {
  name = windowrule-3
  float = on
  match:class = dialog
}

windowrule {
  name = windowrule-4
